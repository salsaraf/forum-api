name: CD to Railway

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Install Railway CLI
        run: npm install -g @railway/cli@2.0.21  # Gunakan versi lama yang support --token
      
      - name: Deploy
        run: |
          railway login --token ${{ secrets.RAILWAY_TOKEN }}
          railway up --service forum-api --detach